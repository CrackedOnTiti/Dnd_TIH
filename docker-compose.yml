services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:/app/data/dnd.db
      - HOST_USERNAME=${HOST_USERNAME:-host}
      - HOST_PIN=${HOST_PIN:-0000}
      - RUST_LOG=${RUST_LOG:-info}
    expose:
      - "3000"
    depends_on: []

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
