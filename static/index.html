<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DND_TIH</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-center">
  <div class="login-box">
    <h1>DND_TIH</h1>
    <p class="login-subtitle">Entrez votre mot de passe ou creez un compte</p>

    <div class="form-row">
      <label>Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="votre nom" autocomplete="username">
    </div>
    <div class="form-row">
      <label>Mot de passe (4 chiffres)</label>
      <input type="password" id="pin" placeholder="0000" maxlength="4" autocomplete="current-password">
    </div>

    <div class="form-actions">
      <button class="primary" onclick="doLogin()">Connexion</button>
      <button onclick="doRegister()">Creer un compte</button>
    </div>

    <p class="error-msg" id="error-msg"></p>
  </div>
</div>

<script>
  async function checkSession() {
    try {
      const r = await fetch('/api/me');
      if (r.ok) {
        const d = await r.json();
        redirect(d.role);
      }
    } catch {}
  }

  function redirect(role) {
    if (role === 'host') window.location.href = '/host.html';
    else window.location.href = '/player.html';
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const pin = document.getElementById('pin').value.trim();
    if (!username || !pin) { showError('Remplissez tous les champs.'); return; }

    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, pin })
    });
    const d = await r.json();
    if (!r.ok) { showError(d.error || 'Erreur'); return; }
    redirect(d.role);
  }

  async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const pin = document.getElementById('pin').value.trim();
    if (!username || !pin) { showError('Remplissez tous les champs.'); return; }
    if (!/^\d{4}$/.test(pin)) { showError('Le mot de passe doit comporter exactement 4 chiffres.'); return; }

    const r = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, pin })
    });
    const d = await r.json();
    if (!r.ok) { showError(d.error || 'Erreur'); return; }
    redirect(d.role);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  checkSession();
</script>
</body>
</html>
